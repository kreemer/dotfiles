[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10

decorations = "Buttonless"
startup_mode = "Maximized"
opacity = 0.9
blur = true

option_as_alt = "Both"

[font]
normal.family = "Hack Nerd Font"

size = 16

[general]
live_config_reload = true
import = [
    "~/.config/alacritty/gruvbox_material_hard_dark.toml"
]

[keyboard]
bindings = [
  { key = "Right", mods = "Alt", chars = "\u001BF" },
  { key = "Left",  mods = "Alt", chars = "\u001BB" },
  { key = "Backspace", mods = "Alt", chars = "\u001B\u007F" },
  { key = "/", mods = "Alt", chars = "\u001B/" },
  { key = "Key0", mods = "Command", action = "ResetFontSize" },
  { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
  { key = "Backspace", mods = "Command", chars = "\u0015" },
  { key = "Left", mods = "Command", chars = "\u001BOH" },
  { key = "Right", mods = "Command", chars = "\u001BOF" },
  { key = "M", mods = "Command", action = "ToggleMaximized" },
]

